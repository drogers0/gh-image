name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - run: go vet ./...
      - run: go test -race -cover ./...
      - run: go build ./...
      - name: Cross-compile android/arm64
        run: GOOS=android GOARCH=arm64 CGO_ENABLED=0 go build -o /dev/null .
