version: 2

builds:
  - binary: gh-image
    main: .
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - darwin
      - linux
      - windows
      - android
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
      # android/amd64 requires external (cgo) linking; we build with CGO_ENABLED=0.
      - goos: android
        goarch: amd64

archives:
  - format: binary
    name_template: "{{ .Os }}-{{ .Arch }}"

checksum:
  name_template: "checksums.txt"
  algorithm: sha256
